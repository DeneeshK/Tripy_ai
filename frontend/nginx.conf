server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxied to the backend container (see docker-compose.yml). Buffering is
    # off because /api/chat streams tokens as they arrive (StreamingResponse
    # in api/main.py) -- buffered proxying would hold the whole reply until
    # the stream ended, defeating the point of streaming.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
